# Pytest configuration only. The runtime environment is still pinned by
# requirements.txt (see CLAUDE.md); this file does not manage dependencies.
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra"
markers = [
    "needs_augsburg: requires the Augsburg PA000001 sample segmentations",
    "needs_nako: requires the NaKo sample hip segmentations",
    "needs_ct: requires a whole-leg CT segmentation (MORPH_CT_SAMPLE)",
    "stochastic: result depends on a stochastic method; assert structure/ranges, not exact values",
]
